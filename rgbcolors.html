<!DOCTYPE html>
<html>
    <head>
        <style>
            #p1{background-color:rgb(255,0,0);}
            #p2{background-color:rgb(0,255,0);}
            #p3{background-color:rgb(0,0,255);}
            #p4{background-color:rgb(255,255,0);}
            #p5{background-color:rgb(255,0,255);}
            #p6{background-color:rgb(0,255,255);}
            #p7{background-color:rgb(192,192,192);}
        </style>
    </head>


<body>
    <h2>RGB colors</h2>
    <p>RGB colors are specified using the rgb() function with three values representing red, green, and blue.</p>

    <p id="p1">red</p>
    <p id="p2">green</p>
    <p id="p3">blue</p>
    <p id="p4">yellow</p>
    <p id="p5">magenta</p>
    <p id="p6">cyan</p>
    <p id="p7">gray</p>
</body>
</html>
